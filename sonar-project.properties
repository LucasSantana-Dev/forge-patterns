sonar.projectKey=Forge-Space_core
sonar.organization=forge-space

# Project metadata
sonar.projectName=@forgespace/core
sonar.projectVersion=1.11.0

# Source directories
sonar.sources=src,patterns/shared-constants,patterns/idp
sonar.tests=src,patterns/idp/__tests__,test

# Test file patterns
sonar.test.inclusions=**/*.test.ts,**/*.test.js,**/*.spec.ts,**/__tests__/**/*.ts

# Exclusions
sonar.exclusions=\
  dist/**,\
  coverage/**,\
  node_modules/**,\
  patterns/ide-extensions/**,\
  patterns/shared-infrastructure/logger/**,\
  patterns/monitoring/**,\
  src/mcp-context-server/index.ts,\
  src/mcp-context-server/store.ts,\
  src/mcp-context-server/resources.ts,\
  src/mcp-context-server/tools.ts

# Coverage exclusions (CLI entry points, non-testable)
sonar.coverage.exclusions=\
  patterns/idp/*/cli.ts,\
  patterns/idp/**/__tests__/**

# CPD exclusions (duplicate code patterns in similar modules)
sonar.cpd.exclusions=\
  patterns/idp/migration/collectors/**,\
  patterns/idp/scorecards/collectors/**

# Coverage reports (generated by Jest --coverage)
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8
