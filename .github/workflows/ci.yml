name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - run: npm run lint:check
      - run: npm run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - run: npm run build

  validation:
    name: Pattern Validation
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - run: npm run test:validation

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - name: Run npm audit
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

  test-autogen-warn:
    name: Test Autogen (Warn)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@6fbe56bc610ddf84b70f213c752b95196bcadd95
      - name: Run test-autogen parity check
        uses: Forge-Space/forge-ai-action@c94c33a286c29faddb05cd4a0d0f1e08e390aa4b
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          command: test-autogen-check
          test_autogen_phase: warn
          comment: true
          annotations: true
