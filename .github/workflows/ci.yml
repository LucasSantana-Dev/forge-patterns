name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@6fbe56bc610ddf84b70f213c752b95196bcadd95
      - run: npm run lint:check
      - run: npm run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@6fbe56bc610ddf84b70f213c752b95196bcadd95
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@6fbe56bc610ddf84b70f213c752b95196bcadd95
      - run: npm run build

  validation:
    name: Pattern Validation
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@6fbe56bc610ddf84b70f213c752b95196bcadd95
      - run: npm run test:validation

  tenant-decoupling:
    name: Tenant Decoupling
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@6fbe56bc610ddf84b70f213c752b95196bcadd95
      - run: npm run check:tenant-decoupling

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@6fbe56bc610ddf84b70f213c752b95196bcadd95
      - name: Run npm audit
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

  test-autogen-warn:
    name: Test Autogen (Warn)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@6fbe56bc610ddf84b70f213c752b95196bcadd95
      - uses: actions/checkout@v6
        continue-on-error: true
        with:
          repository: Forge-Space/forge-tenant-profiles
          path: .forge-tenant-profiles
      - name: Run test-autogen parity check
        if: hashFiles('.forge-tenant-profiles/tenants/acme-sandbox/profile.yaml') != ''
        uses: Forge-Space/forge-ai-action@484c056b923dcd1b8f43c5a18dfa147c77bcb23b
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          command: test-autogen-check
          tenant: acme-sandbox
          tenant_profile_ref: .forge-tenant-profiles/tenants/acme-sandbox/profile.yaml
          test_autogen_phase: warn
          comment: true
          annotations: true
      - name: Skip parity when tenant profile repo is unavailable
        if: hashFiles('.forge-tenant-profiles/tenants/acme-sandbox/profile.yaml') == ''
        run: echo "Skipping test-autogen parity: tenant profile repo/path unavailable."
